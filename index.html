<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping time</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
    <section class="navbar">
        <h2>MANVOGUE</h2>
        <div class="quickoption">
            <ol>
                <li>Home</li>
                <li>New Arrivals</li>
                <li>Shirts</li>
                <li>Suits</li>
                <li>Sales</li>
            </ol>
        </div>
        <div class="icons">
            <i class="ti ti-search"></i>
            <i class="ti ti-heart"></i>
            <i class="ti ti-shopping-bag"></i>
            <i class="ti ti-user"></i>
        </div>
    </section>
    <section class="homepage">
        <p class="collection">NEW COLLECTION 2025</p>
        <p class="dress">DRESS<br>LIKE A<br> MAN</p>
        <p class="para">Premium men's fashion — shirts, suits & more</p>
        <div class="shirticon">
            <i class="ti ti-shirt"></i>
        </div>
        <div class="tieicon">
            <i class="ti ti-tie"></i>
        </div>
        <div class="shopping">
            <p class="shopnow">Shopnow</p>
            <p class="viewlookbook">ViewLookbook</p>
        </div>
    </section> 
</body>
</html>
